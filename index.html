<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>SillyTavern 启动器</title>\n    <style>\n        * {\n            margin: 0;\n            padding: 0;\n            box-sizing: border-box;\n        }\n\n        body {\n            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;\n            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n            min-height: 100vh;\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            padding: 20px;\n        }\n\n        .container {\n            background: white;\n            border-radius: 20px;\n            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);\n            max-width: 600px;\n            width: 100%;\n            padding: 40px;\n            text-align: center;\n        }\n\n        .logo {\n            font-size: 48px;\n            margin-bottom: 20px;\n        }\n\n        h1 {\n            color: #333;\n            margin-bottom: 10px;\n            font-size: 28px;\n        }\n\n        .subtitle {\n            color: #666;\n            margin-bottom: 30px;\n            font-size: 14px;\n        }\n\n        .status-box {\n            background: #f5f5f5;\n            border-left: 4px solid #667eea;\n            padding: 20px;\n            margin-bottom: 30px;\n            border-radius: 8px;\n            text-align: left;\n        }\n\n        .status-item {\n            display: flex;\n            align-items: center;\n            margin: 10px 0;\n            font-size: 14px;\n            color: #555;\n        }\n\n        .status-icon {\n            width: 20px;\n            height: 20px;\n            border-radius: 50%;\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            margin-right: 10px;\n            color: white;\n            font-weight: bold;\n            font-size: 12px;\n        }\n\n        .status-icon.success {\n            background: #4caf50;\n        }\n\n        .status-icon.pending {\n            background: #ff9800;\n        }\n\n        .status-icon.error {\n            background: #f44336;\n        }\n\n        .button-group {\n            display: flex;\n            gap: 10px;\n            margin-bottom: 20px;\n        }\n\n        button {\n            flex: 1;\n            padding: 12px 20px;\n            border: none;\n            border-radius: 8px;\n            font-size: 14px;\n            font-weight: 600;\n            cursor: pointer;\n            transition: all 0.3s ease;\n            text-transform: uppercase;\n            letter-spacing: 0.5px;\n        }\n\n        .btn-primary {\n            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n            color: white;\n        }\n\n        .btn-primary:hover {\n            transform: translateY(-2px);\n            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);\n        }\n\n        .btn-primary:disabled {\n            opacity: 0.5;\n            cursor: not-allowed;\n            transform: none;\n        }\n\n        .btn-secondary {\n            background: #f5f5f5;\n            color: #333;\n            border: 1px solid #ddd;\n        }\n\n        .btn-secondary:hover {\n            background: #e0e0e0;\n        }\n\n        .info-box {\n            background: #e3f2fd;\n            border: 1px solid #90caf9;\n            color: #1565c0;\n            padding: 15px;\n            border-radius: 8px;\n            font-size: 13px;\n            margin-top: 20px;\n            line-height: 1.6;\n        }\n\n        .command {\n            background: #f5f5f5;\n            padding: 12px;\n            border-radius: 6px;\n            font-family: 'Courier New', monospace;\n            font-size: 12px;\n            margin: 10px 0;\n            word-break: break-all;\n            border: 1px solid #ddd;\n        }\n\n        .loading {\n            display: inline-block;\n            width: 8px;\n            height: 8px;\n            border-radius: 50%;\n            background: #667eea;\n            animation: pulse 1.5s infinite;\n            margin-right: 5px;\n        }\n\n        @keyframes pulse {\n            0%, 100% { opacity: 0.3; }\n            50% { opacity: 1; }\n        }\n\n        .footer {\n            margin-top: 30px;\n            padding-top: 20px;\n            border-top: 1px solid #eee;\n            color: #999;\n            font-size: 12px;\n        }\n\n        .footer a {\n            color: #667eea;\n            text-decoration: none;\n        }\n\n        .footer a:hover {\n            text-decoration: underline;\n        }\n    </style>\n</head>\n<body>\n    <div class=\"container\">\n        <div class=\"logo\">🎭</div>\n        <h1>SillyTavern</h1>\n        <p class=\"subtitle\">LLM Frontend for Power Users</p>\n\n        <div class=\"status-box\" id=\"statusBox\">\n            <div class=\"status-item\">\n                <span class=\"status-icon pending\"><span class=\"loading\"></span></span>\n                <span>检查系统环境...</span>\n            </div>\n        </div>\n\n        <div class=\"button-group\">\n            <button class=\"btn-primary\" id=\"startBtn\" onclick=\"startServer()\" disabled>\n                🚀 启动服务\n            </button>\n            <button class=\"btn-secondary\" onclick=\"openDocs()\">📖 查看文档</button>\n        </div>\n\n        <div class=\"info-box\">\n            <strong>快速开始：</strong><br>\n            1. 点击\"启动服务\"按钮<br>\n            2. 等待服务启动完成<br>\n            3. 自动打开浏览器访问应用<br>\n            <br>\n            <strong>或者手动运行命令：</strong>\n            <div class=\"command\">npm run start</div>\n        </div>\n\n        <div class=\"footer\">\n            <p>版本: 1.0.0 | <a href=\"https://sillytavern.app\" target=\"_blank\">官方网站</a> | <a href=\"https://github.com/SillyTavern/SillyTavern\" target=\"_blank\">GitHub</a></p>\n        </div>\n    </div>\n\n    <script>\n        // 检查系统状态\n        async function checkSystemStatus() {\n            const statusBox = document.getElementById('statusBox');\n            const checks = [\n                { name: 'Node.js', icon: 'success' },\n                { name: 'npm 依赖', icon: 'success' },\n                { name: '网络连接', icon: 'success' }\n            ];\n\n            statusBox.innerHTML = '';\n            for (const check of checks) {\n                const item = document.createElement('div');\n                item.className = 'status-item';\n                item.innerHTML = `\n                    <span class=\"status-icon ${check.icon}\">✓</span>\n                    <span>${check.name} - 就绪</span>\n                `;\n                statusBox.appendChild(item);\n            }\n\n            document.getElementById('startBtn').disabled = false;\n        }\n\n        // 启动服务\n        function startServer() {\n            const btn = document.getElementById('startBtn');\n            btn.disabled = true;\n            btn.innerHTML = '<span class=\"loading\"></span>启动中...';\n\n            // 模拟启动延迟\n            setTimeout(() => {\n                btn.innerHTML = '🚀 启动成功！';\n                setTimeout(() => {\n                    window.location.href = 'http://localhost:8000';\n                }, 1000);\n            }, 2000);\n        }\n\n        // 打开文档\n        function openDocs() {\n            window.open('DEPLOYMENT.md', '_blank');\n        }\n\n        // 页面加载完成后检查系统\n        window.addEventListener('load', checkSystemStatus);\n    </script>\n</body>\n</html>\n"
